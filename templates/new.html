<!DOCTYPE html>
<html>
<head>
    	<title>Semut Trace</title>
    	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<style>
	body {
    		font-family: Arial, sans-serif;
    		margin: 20px;
	}

	.container {
    		max-width: 800px;
    		margin: auto;
	}

	textarea {
    		width: 100%;
    		box-sizing: border-box;
	}

	input, select {
	    	width: 100%;
    		padding: 8px;
	    	box-sizing: border-box;
	}

	button {
    		padding: 10px;
	    	width: 100%;
	    margin-top: 10px;
	}

	table {
    		width: 100%;
		border-collapse: collapse;
	}

	td, th {
    		padding: 8px;
		border: 1px solid #ccc;
	}
	</style>
</head>
<body>
<div class="container">
    <h1>New Request</h1>

    <form action="/submit" method="post">
        <label>Type</label><br>
        <select name="request_type">
            <option>Quote</option>
            <option>Email</option>
            <option>Review Reply</option>
            <option>Social Post</option>
            <option>Other</option>
        </select>

        <br><br>

        <label>Request</label><br>
        <textarea name="request_text" rows="8" cols="60"></textarea>

        <br><br>

        <button type="submit">Submit</button>
    </form>

    <br>

    <a href="/requests_page">View Requests</a>
</div>
</body>
</html>
