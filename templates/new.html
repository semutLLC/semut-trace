<!DOCTYPE html>
<html lang="en">
<head>
    <title>Semut Trace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }

    .container {
        max-width: 800px;
        margin: auto;
    }

    textarea {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
    }

    input, select {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
    }

    button {
        padding: 10px;
        width: 100%;
        margin-top: 10px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    td, th {
        padding: 8px;
        border: 1px solid #ccc;
    }

    .error {
        color: #b42318;
        margin: 8px 0 0;
        min-height: 1.5em;
    }
    </style>
</head>
<body>
<div class="container">
    <h1>Generate a Draft</h1>
    <p>Describe what you need. Semut will prepare a draft for you to review.</p>

    <form id="request_form" action="/submit" method="post" novalidate>
        <label for="request_text">What would you like help drafting?</label><br>
        <textarea
            id="request_text"
            name="request_text"
            rows="8"
            cols="60"
            required
            aria-describedby="request_error"
            aria-invalid="{{ 'true' if error|default('') else 'false' }}"
        >{{ request_text|default('') }}</textarea>
        <p id="request_error" class="error" role="alert">{{ error|default('') }}</p>

        <br>

        <button type="submit">Generate Draft</button>
    </form>

    <p><small>AI-generated drafts are never sent automatically and require your review.</small></p>

    <br>

    <a href="/requests_page">View Requests</a>
</div>
<script>
const form = document.querySelector("#request_form");
const input = document.querySelector("#request_text");
const error = document.querySelector("#request_error");

form.addEventListener("submit", (event) => {
    if (!input.value.trim()) {
        event.preventDefault();
        error.textContent = "Please enter a request.";
        input.setAttribute("aria-invalid", "true");
        input.focus();
    }
});

input.addEventListener("input", () => {
    if (input.value.trim()) {
        error.textContent = "";
        input.setAttribute("aria-invalid", "false");
    }
});
</script>
</body>
</html>
