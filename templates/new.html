<!DOCTYPE html>
<html lang="en">
<head>
    <title>Semut Trace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }

    .container {
        max-width: 800px;
        margin: auto;
    }

    textarea {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
    }

    input, select {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
    }

    button {
        padding: 10px;
        width: 100%;
        margin-top: 10px;
    }

    .voice-button[aria-pressed="true"] {
        background: #b42318;
        color: #fff;
    }

    .voice-status {
        margin: 8px 0 0;
        min-height: 1.5em;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    td, th {
        padding: 8px;
        border: 1px solid #ccc;
    }

    .error {
        color: #b42318;
        margin: 8px 0 0;
        min-height: 1.5em;
    }
    </style>
</head>
<body>
<div class="container">
    <h1>Generate a Draft</h1>
    <p>Describe what you need. Semut will prepare a draft for you to review.</p>

    <form id="request_form" action="/submit" method="post" novalidate>
        <label for="request_text">What would you like help drafting?</label><br>
        <textarea
            id="request_text"
            name="request_text"
            rows="8"
            cols="60"
            required
            aria-describedby="request_error voice_status"
            aria-invalid="{{ 'true' if error|default('') else 'false' }}"
        >{{ request_text|default('') }}</textarea>
        <button
            id="voice_button"
            class="voice-button"
            type="button"
            aria-controls="request_text"
            aria-pressed="false"
            hidden
        >Start voice input</button>
        <p id="voice_status" class="voice-status" role="status" aria-live="polite"></p>
        <p id="request_error" class="error" role="alert">{{ error|default('') }}</p>

        <br>

        <button type="submit">Generate Draft</button>
    </form>

    <p><small>AI-generated drafts are never sent automatically and require your review.</small></p>

    <br>

    <a href="/requests_page">View Requests</a>
</div>
<script>
const form = document.querySelector("#request_form");
const input = document.querySelector("#request_text");
const error = document.querySelector("#request_error");
const voiceButton = document.querySelector("#voice_button");
const voiceStatus = document.querySelector("#voice_status");
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {
    const recognition = new SpeechRecognition();
    recognition.lang = navigator.language || "en-US";
    recognition.interimResults = true;
    recognition.continuous = false;

    let listening = false;
    let startingText = "";
    let endMessage = "";

    voiceButton.hidden = false;

    voiceButton.addEventListener("click", () => {
        if (listening) {
            recognition.stop();
            return;
        }

        startingText = input.value.trim();
        endMessage = "";
        recognition.start();
    });

    recognition.addEventListener("start", () => {
        listening = true;
        voiceButton.textContent = "Stop listening";
        voiceButton.setAttribute("aria-pressed", "true");
        voiceStatus.textContent = "Listening… Speak your request.";
    });

    recognition.addEventListener("result", (event) => {
        let transcript = "";
        for (let index = 0; index < event.results.length; index += 1) {
            transcript += event.results[index][0].transcript;
        }

        const separator = startingText && transcript ? " " : "";
        input.value = (startingText + separator + transcript).trim();
        input.dispatchEvent(new Event("input"));
    });

    recognition.addEventListener("error", (event) => {
        const messages = {
            "not-allowed": "Microphone access was denied.",
            "no-speech": "No speech was detected. Please try again.",
            "network": "Voice recognition could not reach the speech service."
        };
        endMessage = messages[event.error] || "Voice input stopped unexpectedly.";
    });

    recognition.addEventListener("end", () => {
        listening = false;
        voiceButton.textContent = "Start voice input";
        voiceButton.setAttribute("aria-pressed", "false");
        voiceStatus.textContent = endMessage || "Voice input finished. Review the text before generating.";
    });
} else {
    voiceStatus.textContent = "Voice input is not supported in this browser. You can still type your request.";
}

form.addEventListener("submit", (event) => {
    if (!input.value.trim()) {
        event.preventDefault();
        error.textContent = "Please enter a request.";
        input.setAttribute("aria-invalid", "true");
        input.focus();
    }
});

input.addEventListener("input", () => {
    if (input.value.trim()) {
        error.textContent = "";
        input.setAttribute("aria-invalid", "false");
    }
});
</script>
</body>
</html>
